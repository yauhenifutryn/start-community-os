<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">Warsaw Hackathon 2026, Talent Snapshot</title>
  <desc id="description">A talent snapshot from the START Warsaw and OpenAI hackathon.</desc>

  <image xlink:href="community-os-gradient-og.png" x="0" y="0" width="1200" height="630" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1200" height="630" fill="#02051d" fill-opacity="0.24"/>

  <g fill="#fcfbf7" font-family="Avenir Next, Avenir, Arial, sans-serif">
    <image xlink:href="start-warsaw-white.png" x="76" y="40" width="150" height="87.5" preserveAspectRatio="xMidYMid meet"/>
    <text x="258" y="94" font-size="28" font-weight="400" fill-opacity="0.62">×</text>
    <image xlink:href="openai-wordmark-white.png" x="292" y="66" width="134" height="36" preserveAspectRatio="xMidYMid meet"/>

    <text x="72" y="274" font-size="86" font-weight="700" letter-spacing="-4.2">Warsaw</text>
    <text x="72" y="360" font-size="86" font-weight="700" letter-spacing="-4.2">Hackathon</text>

    <text x="76" y="456" font-size="32" font-weight="600" letter-spacing="0.2">Talent Snapshot</text>
    <text x="76" y="504" font-size="21" font-weight="500" fill-opacity="0.76" letter-spacing="0.2">286 applicants · 83 accepted · 78 attended</text>

    <text x="1118" y="574" font-size="244" font-weight="700" fill-opacity="0.11" letter-spacing="-13" text-anchor="end">26</text>
  </g>
</svg>
