<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">Warsaw Hackathon 2026, Talent Snapshot</title>
  <desc id="description">START Warsaw and OpenAI present a talent snapshot from Warsaw Hackathon 2026.</desc>

  <rect width="1200" height="630" fill="#00002c"/>
  <image xlink:href="community-os-gradient-og.png" x="0" y="0" width="1200" height="630" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1200" height="630" fill="#00002c" fill-opacity="0.52"/>

  <g aria-label="START Warsaw × OpenAI">
    <image xlink:href="start-warsaw-white.png" x="300" y="88" width="208" height="121" preserveAspectRatio="xMidYMid meet"/>
    <text x="591" y="173" fill="#fcfbf7" font-family="Avenir Next, Avenir, Arial, sans-serif" font-size="64" font-weight="500" text-anchor="middle">X</text>
    <image xlink:href="openai-wordmark-white.png" x="674" y="119" width="226" height="61" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <text x="600" y="366" fill="#fcfbf7" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="700" letter-spacing="-2.5" text-anchor="middle">Warsaw Hackathon 2026</text>
  <text x="600" y="449" fill="#fcfbf7" fill-opacity="0.92" font-family="Avenir Next, Avenir, Arial, sans-serif" font-size="36" font-weight="600" letter-spacing="0.3" text-anchor="middle">Talent Snapshot</text>
</svg>
